training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_epochs: 5

  optimizer:
    type: adamw
    betas: [0.9, 0.999]
    eps: 1e-8

  scheduler:
    type: cosine
    min_lr: 1e-6
    warmup_type: linear

  augmentation:
    train:
      horizontal_flip: 0.5
      vertical_flip: 0.0
      rotate_limit: 15
      scale_limit: 0.1
      brightness_limit: 0.2
      contrast_limit: 0.2
    val:
      # No augmentation for validation
      pass

early_stopping:
  patience: 10
  min_delta: 0.001

checkpoint:
  save_best: true
  save_last: true
  monitor: val_accuracy
  mode: max
